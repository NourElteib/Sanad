<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="تسجيل دخول المشرف - منصة صحتي النفسية" />
  <title>تسجيل الدخول | إدارة المنصة</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>

<body class="login-page">

<!-- Decorative blobs -->
<div class="login-blob-1" aria-hidden="true"></div>
<div class="login-blob-2" aria-hidden="true"></div>

<!-- Login Wrapper -->
<div class="login-wrapper">
  <main class="login-card" role="main">

    <!-- Logo -->
    <div class="login-logo-ring" aria-hidden="true">🌸</div>

    <h1>لوحة الإدارة</h1>
    <p class="login-sub">
      مدرسة قنا الفنية التجارية بنات<br />
      <span style="font-size:.75rem;opacity:.7">منصة الصحة النفسية</span>
    </p>

    <!-- Error Alert -->
    <div id="login-error" class="login-error" role="alert" aria-live="polite">
      <span aria-hidden="true">⚠️</span>
      اسم المستخدم أو كلمة المرور غير صحيحة
    </div>

    <!-- Form -->
    <form id="login-form" novalidate autocomplete="off">

      <div class="form-group-custom">
        <label class="form-label-custom" for="username">اسم المستخدم</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input-custom"
          placeholder="أدخلي اسم المستخدم"
          autocomplete="username"
          required
          aria-required="true"
        />
      </div>

      <div class="form-group-custom">
        <label class="form-label-custom" for="password">كلمة المرور</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input-custom"
          placeholder="أدخلي كلمة المرور"
          autocomplete="current-password"
          required
          aria-required="true"
        />
      </div>

      <button type="submit" id="login-btn" class="btn-login">
        🔐 تسجيل الدخول
      </button>

    </form>

    <div class="login-back-link">
      <a href="index.html">← العودة للموقع</a>
    </div>

    <!-- Demo hint (remove in production) -->
    <p style="text-align:center;font-size:.72rem;color:var(--clr-text-muted);margin-top:1rem;background:var(--clr-bg);border-radius:var(--radius-sm);padding:.5rem;">
      💡 للتجربة: <strong>admin</strong> / <strong>admin123</strong>
    </p>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
